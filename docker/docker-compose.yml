services:
  app:
    build: ./container/php
    environment:
      TZ: 'Asia/Tokyo'
    volumes:
      - /var/www/${__WSL_COMPOSE_PROJECT_DIR:-none}:/var/www/source
      - ./container/php/php.ini:/usr/local/etc/php/php.ini:ro
      - ./container/php/.bash_aliases:/root/.bash_aliases:ro
      - ./container/php/.bashrc:/root/.bashrc:ro
    working_dir: /var/www/source
    networks:
      - network-bc-draft
  job:
    build: ./container/job
    environment:
      TZ: 'Asia/Tokyo'
    volumes:
      - /var/www/${__WSL_COMPOSE_PROJECT_DIR:-none}:/var/www/source
      - ./container/job/php.ini:/usr/local/etc/php/php.ini:ro
      - ./container/job/.bash_aliases:/root/.bash_aliases:ro
      - ./container/job/.bashrc:/root/.bashrc:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./container/job/system:/etc/systemd/system
    working_dir: /var/www/source
    privileged: true
    command: /lib/systemd/systemd
    depends_on:
      - app
    networks:
      - network-bc-draft
  nginx:
    image: nginx
    ports:
      - 8000:80
    volumes:
      - /var/www/${__WSL_COMPOSE_PROJECT_DIR:-none}:/var/www/source
      - ./container/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    working_dir: /var/www/source
    depends_on:
      - app
    networks:
      - network-bc-draft
  mysql_master:
    container_name: 'mysql_master'
    build:
      context: ./container/mysql/master
      dockerfile: Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${COMPOSE_PROJECT_NAME}
      TZ: 'Asia/Tokyo'
    volumes:
      - mysql_master:/var/lib/mysql
      # - ./master.cnf:/etc/mysql/conf.d/master.cnf:ro
      - ./container/mysql/master/init.d:/docker-entrypoint-initdb.d
    ports:
      - 3306:3306
    privileged: true
    networks:
      - network-bc-draft
  mysql_slave:
    # image: mysql:5.7
    container_name: 'mysql_slave'
    build:
      context: ./container/mysql/slave
      dockerfile: Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: root
      # MYSQL_USER: guest
      # MYSQL_PASSWORD: guest
      TZ: 'Asia/Tokyo'
    volumes:
      - mysql_slave:/var/lib/mysql
      # - ./slave.cnf:/etc/mysql/conf.d/slave.cnf:ro
      - ./container/mysql/slave/init.d:/docker-entrypoint-initdb.d
    ports:
      - 3316:3306
    depends_on:
      - mysql_master
    networks:
      - network-bc-draft
  redis:
    image: redis:7.0
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    networks:
      - network-bc-draft
    depends_on:
      - app
volumes:
  mysql_master:
  mysql_slave:
  redis_data:
networks:
  network-bc-draft:
    driver: bridge
